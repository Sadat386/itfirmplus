<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - IT Firm Plus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="portfolio-page">

    <header>
        <nav>
            <a href="/" class="logo">IT Firm Plus</a>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/about.html">About Us</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/team.html">Team</a></li>
                <li><a href="/portfolio.html">Portfolio</a></li>
            </ul>
            <button id="mobile-menu-button" class="mobile-menu-button">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
        <div id="mobile-menu" class="mobile-menu">
            <ul>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/about.html">About Us</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/team.html">Team</a></li>
                <li><a href="/portfolio.html">Portfolio</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="portfolio">
            <div class="container">
                <h2>Our Portfolio</h2>
                <div class="filter-bar">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="web-development">Web Development</button>
                    <button class="filter-btn" data-category="mobile-app-development">Mobile App Development</button>
                    <button class="filter-btn" data-category="cloud-solutions">Cloud Solutions</button>
                </div>
                <div id="projects-grid" class="grid-container">
                    <!-- Projects will be dynamically loaded here -->
                </div>
                <div id="pagination-container" class="pagination-container"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 IT Firm Plus. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const projectsGrid = document.getElementById('projects-grid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const paginationContainer = document.getElementById('pagination-container');

            let currentPage = 1;
            let currentCategory = 'all';
            const limit = 6;

            const fetchProjects = async (page = 1, category = 'all') => {
                try {
                    const res = await fetch(`/api/projects?page=${page}&limit=${limit}&category=${category}`);
                    const data = await res.json();
                    displayProjects(data.projects);
                    displayPagination(data.totalPages);
                } catch (err) {
                    console.error('Error fetching projects:', err);
                }
            };

            const displayProjects = (projects) => {
                projectsGrid.innerHTML = '';
                projects.forEach(project => {
                    const projectCard = document.createElement('div');
                    projectCard.className = 'service-card';
                    projectCard.innerHTML = `
                        <img src="${project.imageUrl}" alt="${project.title}" class="project-img">
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <a href="${project.url}" target="_blank" class="btn-primary">View Project</a>
                    `;
                    projectsGrid.appendChild(projectCard);
                });
            };

            const displayPagination = (totalPages) => {
                paginationContainer.innerHTML = '';
                for (let i = 1; i <= totalPages; i++) {
                    const pageLink = document.createElement('button');
                    pageLink.className = 'pagination-link';
                    if (i === currentPage) {
                        pageLink.classList.add('active');
                    }
                    pageLink.innerText = i;
                    pageLink.addEventListener('click', () => {
                        currentPage = i;
                        fetchProjects(currentPage, currentCategory);
                    });
                    paginationContainer.appendChild(pageLink);
                }
            };

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    currentPage = 1;
                    fetchProjects(currentPage, currentCategory);
                });
            });

            fetchProjects();

            // Mobile menu toggle
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('active');
            });
        });
    </script>

</body>
</html>
