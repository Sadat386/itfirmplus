<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - IT Firm Plus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <a href="/" class="logo">IT Firm Plus</a>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/about.html">About Us</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/team.html">Team</a></li>
                <li><a href="/portfolio.html">Portfolio</a></li>
            </ul>
            <button id="mobile-menu-button" class="mobile-menu-button">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
        <div id="mobile-menu" class="mobile-menu">
            <ul>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/about.html">About Us</a></li>
                <li><a href="/contact.html">Contact</a></li>
                <li><a href="/team.html">Team</a></li>
                <li><a href="/portfolio.html">Portfolio</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="services">
            <div class="container">
                <h2>Our Services</h2>
                <div id="services-grid" class="grid-container">
                    <!-- Services will be dynamically loaded here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 IT Firm Plus. All rights reserved.</p>
        </div>
    </footer>

    <div id="quote-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h3>Request a Quote</h3>
            <form id="quote-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="service">Service:</label>
                    <input type="text" id="service" name="service" readonly>
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Submit</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const servicesGrid = document.getElementById('services-grid');
            const modal = document.getElementById('quote-modal');
            const closeButton = document.querySelector('.close-button');
            const quoteForm = document.getElementById('quote-form');
            const serviceInput = document.getElementById('service');

            const fetchServices = async () => {
                try {
                    const res = await fetch('/api/services');
                    const services = await res.json();

                    servicesGrid.innerHTML = ''; // Clear existing content

                    services.forEach(service => {
                        const serviceCard = document.createElement('div');
                        serviceCard.className = 'service-card';
                        serviceCard.innerHTML = `
                            <i class="${service.icon}"></i>
                            <h3>${service.name}</h3>
                            <p>${service.description}</p>
                            <button class="btn-primary request-quote-btn" data-service="${service.name}">Request a Quote</button>
                        `;
                        servicesGrid.appendChild(serviceCard);
                    });
                } catch (err) {
                    console.error('Error fetching services:', err);
                }
            };

            servicesGrid.addEventListener('click', (e) => {
                if (e.target.classList.contains('request-quote-btn')) {
                    serviceInput.value = e.target.dataset.service;
                    modal.style.display = 'block';
                }
            });

            closeButton.addEventListener('click', () => {
                modal.style.display = 'none';
            });

            window.addEventListener('click', (e) => {
                if (e.target == modal) {
                    modal.style.display = 'none';
                }
            });

            quoteForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                // Handle form submission here
                modal.style.display = 'none';
            });

            fetchServices();

            // Mobile menu toggle
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('active');
            });
        });
    </script>

</body>
</html>
